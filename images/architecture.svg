<svg width="100%" viewBox="0 0 680 480" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>jhansi.io architecture diagram</title>
  <desc>Three-layer architecture: AI tools at top feed into jhansi SDK, which calls Petri execution engine, with TenantVault secrets layer alongside</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- AI Tools row -->
  <rect x="80" y="40" width="120" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="140" y="62" text-anchor="middle" dominant-baseline="central" fill="#085041">Cursor</text>

  <rect x="220" y="40" width="120" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="280" y="62" text-anchor="middle" dominant-baseline="central" fill="#085041">Claude Code</text>

  <rect x="360" y="40" width="120" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="420" y="62" text-anchor="middle" dominant-baseline="central" fill="#085041">Your AI agent</text>

  <!-- Arrow down to SDK -->
  <line x1="310" y1="84" x2="310" y2="118" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- jhansi SDK -->
  <rect x="140" y="120" width="340" height="56" rx="8" fill="#1D9E75" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="310" y="142" text-anchor="middle" dominant-baseline="central" fill="#E1F5EE">jhansi SDK (open source)</text>
  <text font-family="sans-serif" font-size="12" x="310" y="160" text-anchor="middle" dominant-baseline="central" fill="#9FE1CB">pip install jhansi · from jhansi import Sandbox</text>

  <!-- Arrow down to Petri -->
  <line x1="310" y1="176" x2="310" y2="210" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Petri box -->
  <rect x="140" y="212" width="340" height="56" rx="8" fill="#1D9E75" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="310" y="234" text-anchor="middle" dominant-baseline="central" fill="#E1F5EE">Petri (open source)</text>
  <text font-family="sans-serif" font-size="12" x="310" y="252" text-anchor="middle" dominant-baseline="central" fill="#9FE1CB">FastAPI execution engine · docker compose up</text>

  <!-- Arrow down to Sandbox containers -->
  <line x1="310" y1="268" x2="310" y2="302" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Sandbox containers row -->
  <rect x="100" y="304" width="130" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="165" y="326" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Sandbox</text>
  <text font-family="sans-serif" font-size="12" x="165" y="344" text-anchor="middle" dominant-baseline="central" fill="#185FA5">Isolated container</text>

  <rect x="245" y="304" width="130" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="310" y="326" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Sandbox</text>
  <text font-family="sans-serif" font-size="12" x="310" y="344" text-anchor="middle" dominant-baseline="central" fill="#185FA5">Isolated container</text>

  <rect x="390" y="304" width="130" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="455" y="326" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Sandbox</text>
  <text font-family="sans-serif" font-size="12" x="455" y="344" text-anchor="middle" dominant-baseline="central" fill="#185FA5">Isolated container</text>

  <!-- TenantVault coming soon -->
  <rect x="520" y="212" width="130" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="585" y="234" text-anchor="middle" dominant-baseline="central" fill="#633806">TenantVault</text>
  <text font-family="sans-serif" font-size="12" x="585" y="252" text-anchor="middle" dominant-baseline="central" fill="#854F0B">Secrets · coming soon</text>
  <line x1="520" y1="240" x2="482" y2="240" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="40" y="420" width="12" height="12" rx="2" fill="#1D9E75" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="12" x="58" y="430" fill="#3d3d3a">Available today</text>
  <rect x="160" y="420" width="12" height="12" rx="2" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="12" x="178" y="430" fill="#3d3d3a">Coming soon</text>
</svg>
